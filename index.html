<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #bc13fe;
            --rs: #00f2ff;
            --green: #00ff88;
            --red: #ff003c;
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1a0b2e 0%, #050508 80%);
            color: #fff; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 20px;
        }

        .dashboard { width: 100%; max-width: 500px; }
        header { margin-bottom: 40px; text-align: center; }
        h1 { font-family: 'Unbounded', cursive; font-size: 26px; background: linear-gradient(180deg, #fff 0%, #bc13fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .status-bar { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 10px; color: rgba(188, 19, 254, 0.5); margin-top: 10px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .card {
            background: var(--glass); backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border); border-radius: 32px;
            padding: 25px; margin-bottom: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }

        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; }
        .row:last-child { border-bottom: none; }
        .name { color: rgba(255, 255, 255, 0.5); }
        .val { font-variant-numeric: tabular-nums; font-weight: 600; }
        .val.ok { color: var(--green); }
        .val.bad { color: var(--red); }

        .chart-wrapper { height: 200px; position: relative; margin-top: 10px; }
        .time-labels { display: flex; justify-content: space-between; margin-top: 12px; font-size: 9px; color: #444; font-weight: 800; text-transform: uppercase; }

        .footer { text-align: center; margin-top: 40px; font-size: 10px; color: rgba(255,255,255,0.1); }
        .author { color: var(--accent); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
            <div class="status-bar"><div class="dot" id="status_dot"></div> ОБНОВЛЕНО <span id="time" style="color:#fff">...</span></div>
        </header>

        <main>
            <div class="card">
                <h2>СЕРВЕРА VALVE</h2>
                <div id="valve_list"></div>
            </div>

            <div class="card">
                <h2>СЕРВЕРА ROCKSTAR</h2>
                <div id="gta_list"></div>
            </div>

            <div class="card">
                <h2>МОНИТОРИНГ СТАБИЛЬНОСТИ</h2>
                <div class="chart-wrapper">
                    <canvas id="mainChart"></canvas>
                </div>
                <div class="time-labels">
                    <span id="start_t">начало</span>
                    <span id="end_t">сейчас</span>
                </div>
            </div>
        </main>

        <footer class="footer">
            by <a href="https://t.me/maybedontab" target="_blank" class="author">@maybedontab</a>
        </footer>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        // Жидкие градиенты
        const gradV = ctx.createLinearGradient(0, 0, 0, 200);
        gradV.addColorStop(0, 'rgba(188, 19, 254, 0.25)');
        gradV.addColorStop(1, 'rgba(188, 19, 254, 0)');

        const gradRS = ctx.createLinearGradient(0, 0, 0, 200);
        gradRS.addColorStop(0, 'rgba(0, 242, 255, 0.2)');
        gradRS.addColorStop(1, 'rgba(0, 242, 255, 0)');

        const mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { 
                        label: 'Valve', data: [], borderColor: '#bc13fe', borderWidth: 3, 
                        fill: true, backgroundColor: gradV, pointRadius: 0, tension: 0.4,
                        segment: { borderColor: ctx => ctx.p1.parsed.y === 0 ? '#ff003c' : undefined }
                    },
                    { 
                        label: 'Rockstar', data: [], borderColor: '#00f2ff', borderWidth: 3, 
                        fill: true, backgroundColor: gradRS, pointRadius: 0, tension: 0.4,
                        segment: { borderColor: ctx => ctx.p1.parsed.y === 0 ? '#ff003c' : undefined }
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { 
                    legend: { 
                        display: true, 
                        labels: { 
                            color: '#555', usePointStyle: true, pointStyle: 'line', 
                            boxWidth: 20, font: { size: 10, weight: 'bold' } 
                        } 
                    }
                },
                scales: {
                    x: { display: false },
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.03)' }, 
                        ticks: { color: 'rgba(255,255,255,0.1)', font: { size: 9 } } 
                    }
                }
            }
        });

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                const isOff = (Date.now() / 1000 - (data.timestamp || 0)) > 60;
                document.getElementById('status_dot').style.background = isOff ? '#ff003c' : '#bc13fe';
                document.getElementById('time').innerText = data.last_update;

                if (data.v_h && data.rs_h && data.t_h) {
                    mainChart.data.labels = data.t_h;
                    mainChart.data.datasets[0].data = data.v_h;
                    mainChart.data.datasets[1].data = data.rs_h;
                    mainChart.update('none');
                    document.getElementById('start_t').innerText = data.t_h[0];
                    document.getElementById('end_t').innerText = data.t_h.at(-1);
                }

                const render = (list, targetId) => {
                    let html = '';
                    list.forEach(s => {
                        const dead = s.ping === 'СДОХ' || s.ping === 0;
                        html += `<div class="row"><span class="name">${s.name}</span><span class="val ${dead ? 'bad' : 'ok'}">${dead ? 'СДОХ' : s.ping + 'мс'}</span></div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };

                render(data.valve, 'valve_list'); render(data.gta, 'gta_list');
            } catch (e) {}
        }
        setInterval(update, 10000); update();
    </script>
</body>
</html>
