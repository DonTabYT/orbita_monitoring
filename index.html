<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #bc13fe;
            --rs: #00f2ff;
            --green: #00ff88;
            --red: #ff003c;
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1a0b2e 0%, #050508 80%);
            color: #fff; font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 20px;
        }

        .dashboard { width: 100%; max-width: 500px; }
        header { margin-bottom: 40px; text-align: center; }

        h1 { 
            font-family: 'Unbounded', cursive; font-size: 28px; 
            background: linear-gradient(180deg, #fff 0%, #bc13fe 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            filter: drop-shadow(0 0 15px rgba(188, 19, 254, 0.8));
        }
        
        /* ВЫРАВНИВАНИЕ ШАПКИ */
        .status-bar { 
            display: flex; align-items: center; justify-content: center; 
            gap: 8px; margin-top: 10px; font-size: 10px;
            color: rgba(188, 19, 254, 0.5); font-weight: 800; text-transform: uppercase;
        }
        
        #time { 
            color: #fff; font-weight: 900; font-size: 11px; 
            letter-spacing: 1px; display: inline-block; line-height: 1;
        }

        .refresh-rate { 
            color: #fff; font-size: 9px; font-weight: 900;
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
            padding: 3px 7px; border-radius: 5px;
            display: inline-block; line-height: 1;
        }

        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .card {
            background: var(--glass); backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border); border-radius: 32px;
            padding: 25px; margin-bottom: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }

        .row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; }
        .row:last-child { border-bottom: none; }
        
        .check-box {
            margin-right: 15px; appearance: none; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.2); border-radius: 4px;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .check-box:checked { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .check-box:checked::after { content: '✔'; position: absolute; font-size: 10px; color: #fff; left: 1px; top: -1px; }

        .name { color: rgba(255, 255, 255, 0.5); flex-grow: 1; }
        .val { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 50px; text-align: right; }
        .val.ok { color: var(--green); text-shadow: 0 0 10px rgba(0, 255, 136, 0.6); }
        .val.bad { color: var(--red); text-shadow: 0 0 10px rgba(255, 0, 60, 0.6); }

        .chart-wrapper { height: 260px; position: relative; margin-top: 10px; }
        .time-labels { display: flex; justify-content: space-between; margin-top: 12px; font-size: 9px; color: #444; font-weight: 800; text-transform: uppercase; }

        .footer { text-align: center; margin-top: 40px; font-size: 10px; color: rgba(255,255,255,0.1); }
        .author { color: var(--accent); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
            <div class="status-bar">
                <div class="dot" id="status_dot"></div> 
                <span>ОБНОВЛЕНО</span> <span id="time">...</span> 
                <span class="refresh-rate">(5 СЕК)</span>
            </div>
        </header>

        <main>
            <div class="card">
                <h2>СЕРВЕРА VALVE</h2>
                <div id="valve_list"></div>
            </div>
            <div class="card">
                <h2>СЕРВЕРА ROCKSTAR</h2>
                <div id="gta_list"></div>
            </div>
            <div class="card">
                <h2>МОНИТОРИНГ СТАБИЛЬНОСТИ</h2>
                <div class="chart-wrapper">
                    <canvas id="mainChart"></canvas>
                </div>
                <div class="time-labels">
                    <span id="start_t">...</span>
                    <span id="end_t">...</span>
                </div>
            </div>
        </main>

        <footer class="footer">
            by <a href="https://t.me/maybedontab" target="_blank" class="author">@maybedontab</a>
        </footer>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        const getSaved = (n) => localStorage.getItem('mon_' + n) !== 'false';
        let h_v = [], h_rs = [], h_dead = [], h_dead_names = [], h_t = [];

        const gradV = ctx.createLinearGradient(0, 0, 0, 260);
        gradV.addColorStop(0, 'rgba(188, 19, 254, 0.3)');
        gradV.addColorStop(1, 'rgba(188, 19, 254, 0)');

        const gradRS = ctx.createLinearGradient(0, 0, 0, 260);
        gradRS.addColorStop(0, 'rgba(0, 242, 255, 0.25)');
        gradRS.addColorStop(1, 'rgba(0, 242, 255, 0)');

        const mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { 
                        label: 'Valve', data: [], borderColor: '#bc13fe', borderWidth: 2, 
                        fill: true, backgroundColor: gradV, pointRadius: 0, 
                        tension: 0.4,
                        /* ИСПРАВИЛ: ОГРОМНЫЙ ХИТБОКС */
                        hitRadius: 25, hoverRadius: 0 
                    },
                    { 
                        label: 'Rockstar', data: [], borderColor: '#00f2ff', borderWidth: 2, 
                        fill: true, backgroundColor: gradRS, pointRadius: 0, 
                        tension: 0.4,
                        /* ИСПРАВИЛ: ОГРОМНЫЙ ХИТБОКС */
                        hitRadius: 25, hoverRadius: 0
                    },
                    { 
                        label: 'СДОХ (Offline)', data: [], borderColor: '#ff003c', borderWidth: 2, 
                        pointRadius: ctx => ctx.raw > 0 ? 4 : 0, pointHoverRadius: 8, 
                        pointBackgroundColor: '#ff003c', showLine: true, tension: 0,
                        /* ИСПРАВИЛ: ХИТБОКС ДЛЯ КРАСНОЙ ЛИНИИ ЕЩЕ БОЛЬШЕ */
                        hitRadius: 40 
                    }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                /* ИСПРАВИЛ: Режим наведения - ловит ближайший элемент по осям */
                interaction: { mode: 'nearest', axis: 'xy', intersect: true },
                plugins: { 
                    legend: { 
                        display: true, 
                        labels: { color: '#555', usePointStyle: true, pointStyle: 'line', boxWidth: 15 } 
                    },
                    tooltip: {
                        enabled: true,
                        backgroundColor: 'rgba(10, 10, 15, 0.95)',
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1,
                        padding: 15,
                        displayColors: true,
                        callbacks: {
                            title: (c) => 'ВРЕМЯ: ' + c[0].label,
                            label: (c) => {
                                if (c.datasetIndex === 0 || c.datasetIndex === 1) {
                                    return ` ${c.dataset.label}: ${c.raw === 0 ? 'СДОХ' : c.raw + 'мс'}`;
                                }
                                if (c.datasetIndex === 2) return '⚠️ СТАТУС: ОБНАРУЖЕН ОТВАЛ';
                                return null;
                            },
                            afterBody: (c) => {
                                const item = c[0];
                                if (item.datasetIndex === 2) {
                                    const dead = h_dead_names[item.dataIndex];
                                    if (dead && dead.length > 0) {
                                        return [
                                            '',
                                            '-----------------------',
                                            '⚠️ В ОТВАЛЕ:',
                                            ...dead.map(name => ' • ' + name)
                                        ];
                                    }
                                }
                                return null;
                            }
                        },
                        filter: function(tooltipItem) {
                            // Логика разделения окон:
                            // Если навели на красную - показываем только её.
                            // Иначе показываем Valve/Rockstar.
                            const chart = tooltipItem.chart;
                            const activeElements = chart.getActiveElements();
                            if (activeElements.length > 0) {
                                const hoveredDatasetIndex = activeElements[0].datasetIndex;
                                if (hoveredDatasetIndex === 2) return tooltipItem.datasetIndex === 2;
                                return tooltipItem.datasetIndex !== 2;
                            }
                            return true;
                        }
                    }
                },
                scales: {
                    x: { display: false },
                    y: { 
                        beginAtZero: true, 
                        grid: { color: 'rgba(255,255,255,0.03)' }, 
                        ticks: { color: 'rgba(255,255,255,0.1)', font: { size: 9 } } 
                    }
                }
            }
        });

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                const isOff = (Date.now() / 1000 - (data.timestamp || 0)) > 30;
                document.getElementById('status_dot').style.background = isOff ? '#ff003c' : '#bc13fe';
                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    list.forEach(s => {
                        const check = getSaved(s.name);
                        const isDead = s.ping === 'СДОХ' || s.ping === 0;
                        html += `
                        <div class="row">
                            <input type="checkbox" class="check-box" ${check ? 'checked' : ''} 
                                   onchange="localStorage.setItem('mon_${s.name}', this.checked); update();">
                            <span class="name">${s.name}</span>
                            <span class="val ${isDead ? 'bad' : 'ok'}">${isDead ? 'СДОХ' : s.ping + 'мс'}</span>
                        </div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };

                render(data.valve, 'valve_list'); render(data.gta, 'gta_list');

                const getAvg = (list) => {
                    const active = list.filter(s => getSaved(s.name) && s.ping !== 'СДОХ' && s.ping !== 0);
                    return active.length ? Math.round(active.reduce((a,b)=>a+b.ping,0)/active.length) : 0;
                };
                
                const getDeadNames = () => {
                    const all = [...data.valve, ...data.gta];
                    return all.filter(s => getSaved(s.name) && (s.ping === 'СДОХ' || s.ping === 0)).map(s => s.name);
                };

                const currentV = getAvg(data.valve);
                const currentRS = getAvg(data.gta);
                const deadList = getDeadNames();

                if (h_t.at(-1) !== data.last_update) {
                    h_v.push(currentV); h_rs.push(currentRS); h_t.push(data.last_update);
                    h_dead_names.push(deadList);
                    h_dead.push(deadList.length > 0 ? 5 : 0);
                    if (h_v.length > 30) { h_v.shift(); h_rs.shift(); h_t.shift(); h_dead.shift(); h_dead_names.shift(); }
                }

                mainChart.data.labels = h_t;
                mainChart.data.datasets[0].data = h_v;
                mainChart.data.datasets[1].data = h_rs;
                mainChart.data.datasets[2].data = h_dead;
                mainChart.update('none');

                document.getElementById('start_t').innerText = h_t[0] || '...';
                document.getElementById('end_t').innerText = h_t.at(-1) || '...';

            } catch (e) {}
        }

        update(); setInterval(update, 5000);
    </script>
</body>
</html>
