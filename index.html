<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орбита Мониторинг</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0f0f12;
            --accent: #00e5ff;
            --green: #00ff88;
            --red: #ff3e3e;
            --text-dim: #888;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #1f1f24;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,229,255,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 5px 0;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-header {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        section { margin-top: 35px; }

        h2 {
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1f;
        }

        .name { font-size: 14px; font-weight: 400; color: #ddd; }
        .val { font-size: 14px; font-weight: 600; }
        
        .val.ok { color: var(--green); }
        .val.bad { color: var(--red); opacity: 0.5; }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 10px;
            color: #333;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🛰️ ORBITA</h1>
        <div class="status-header"><div class="dot"></div> Обновлено: <span id="time">...</span></div>
        
        <section id="discord_sec">
            <h2>Discord Services</h2>
            <div id="discord_list"></div>
        </section>

        <section id="gta_sec">
            <h2>Rockstar Network</h2>
            <div id="gta_list"></div>
        </section>

        <section id="valve_sec">
            <h2>Top 5 Valve Relays</h2>
            <div id="valve_list"></div>
        </section>

        <div class="footer">POWERED BY FIREBASE & GITHUB</div>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    list.forEach(s => {
                        const isOk = s.ping !== 'n/a';
                        html += `
                        <div class="row">
                            <span class="name">${s.name}</span>
                            <span class="val ${isOk ? 'ok' : 'bad'}">${s.ping}${isOk ? 'ms' : ''}</span>
                        </div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };

                render(data.discord, 'discord_list');
                render(data.gta, 'gta_list');
                render(data.valve, 'valve_list');

            } catch (e) { console.error(e); }
        }

        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
