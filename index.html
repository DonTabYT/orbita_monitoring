<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орбита Мониторинг</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent-rockstar: #00e5ff;
            --accent-valve: #ffd600;
            --accent-discord: #5865f2; /* Сине-фиолетовый для Discord */
            --green: #00ff88;
            --red: #ff3e3e;
            --text-dim: #8b949e;
        }

        body {
            background: var(--bg);
            color: #c9d1d9;
            /* ПРИМЕНЯЕМ ПИКСЕЛЬНЫЙ ШРИФТ ДЛЯ ВСЕЙ СТРАНИЦЫ */
            font-family: 'Pixelify Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .logo {
            width: 30px;
            height: 30px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23fff"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 14.93V19h-2v-2.07c-2.83-.48-5-2.94-5-5.93h2c0 2.21 1.79 4 4 4s4-1.79 4-4h2c0 2.99-2.17 5.45-5 5.93zM12 5c3.31 0 6 2.69 6 6h2c0-4.41-3.59-8-8-8s-8 3.59-8 8h2c0-3.31 2.69-6 6-6z"/></svg>');
            background-size: cover;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -1px;
            color: #fff;
        }

        .status-header {
            display: flex;
            align-items: center;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        section { margin-top: 35px; }

        h2 {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        #rockstar_sec h2 { color: var(--accent-rockstar); }
        #valve_sec h2 { color: var(--accent-valve); }
        #discord_sec h2 { color: var(--accent-discord); }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
        }

        .row:last-child { border-bottom: none; }

        .name { font-weight: 400; color: #f0f6fc; }
        .details { display: flex; gap: 10px; align-items: center; font-variant-numeric: tabular-nums;}
        .ping { font-weight: 700; }
        .members { font-weight: 400; color: var(--text-dim); }
        
        .ping.ok { color: var(--green); }
        .ping.bad { color: var(--red); opacity: 0.6; }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 10px;
            color: #484f58;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .author {
            color: var(--accent-discord);
            text-decoration: none;
            opacity: 0.7;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div class="logo"></div>
            <h1>ОРБИТА ХУЙНЯ</h1>
        </div>
        <div class="status-header"><div class="dot"></div> ОБНОВЛЕНО <span id="time">загрузка...</span></div>
        
        <section id="discord_sec">
            <h2>DISCORD VOICE CHANNELS</h2>
            <div id="discord_list">
                <div class="row">
                    <span class="name">💬 General Voice</span>
                    <div class="details"><span class="ping ok"> Онлайн</span> <span class="members">3 Участника</span></div>
                </div>
                <div class="row">
                    <span class="name">💬 Team A chat</span>
                    <div class="details"><span class="ping ok"> Онлайн</span> <span class="members">2 Участника</span></div>
                </div>
                <div class="row">
                    <span class="name">💬 Guild Hall</span>
                    <div class="details"><span class="ping ok"> Онлайн</span> <span class="members">1 Участник</span></div>
                </div>
            </div>
        </section>

        <section id="rockstar_sec">
            <h2>ROCKSTAR NETWORK</h2>
            <div id="rockstar_list"></div>
        </section>

        <section id="valve_sec">
            <h2>Топ-5 серверов Valve</h2>
            <div id="valve_list"></div>
        </section>

        <div class="footer">
            БАЗА ДАННЫХ FIREBASE & GITHUB PAGES <br>
            <span style="margin-top: 10px; display: block;">by <span class="author">@maybedontab</span></span>
        </div>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    if (!list || list.length === 0) {
                        html = '<div class="row"><span class="name" style="color:#484f58">Ожидание данных...</span></div>';
                    } else {
                        list.forEach(s => {
                            const isOk = s.ping !== 'n/a';
                            html += `
                            <div class="row">
                                <span class="name">${s.name}</span>
                                <span class="ping ${isOk ? 'ok' : 'bad'}">${s.ping}${isOk ? 'мс' : ''}</span>
                            </div>`;
                        });
                    }
                    document.getElementById(targetId).innerHTML = html;
                };

                // Отрисовываем существующие секции
                render(data.gta, 'rockstar_list');
                render(data.valve, 'valve_list');

            } catch (e) { 
                document.getElementById('time').innerText = "ОШИБКА СЕТИ";
            }
        }

        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
