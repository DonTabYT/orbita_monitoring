<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --card: #111116;
            --accent: #00f2ff;
            --green: #00ff88;
            --red: #ff3e3e;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased; /* Сглаживание */
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 40px 20px;
        }

        .dashboard { width: 100%; max-width: 480px; }

        header { margin-bottom: 40px; }

        h1 {
            font-size: 38px; /* Ещё больше */
            font-weight: 900;
            margin: 0;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 800;
            color: #444;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 12px var(--green); }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 16px; /* БОЛЬШЕ ШРИФТ */
            font-weight: 600;
        }

        .row:last-child { border-bottom: none; }

        .name { color: #888; letter-spacing: -0.5px; }
        .val { font-variant-numeric: tabular-nums; font-weight: 900; }
        .val.ok { color: var(--green); }
        .val.bad { color: var(--red); opacity: 0.3; }

        .footer {
            text-align: center;
            margin-top: 50px;
            font-size: 11px;
            color: #222;
            letter-spacing: 1px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
            <div class="status-bar"><div class="dot"></div> ОБНОВЛЕНО <span id="time">...</span></div>
        </header>

        <div class="card">
            <h2>DISCORD VOICE</h2>
            <div id="discord_list"></div>
        </div>

        <div class="card">
            <h2>ROCKSTAR NETWORK</h2>
            <div id="gta_list"></div>
        </section>

        <div class="card">
            <h2>TOP 5 VALVE RELAYS</h2>
            <div id="valve_list"></div>
        </div>

        <div class="footer">
            DATABASE: FIREBASE | HOST: GITHUB<br><br>
            by <span style="color: #444">@maybedontab</span>
        </div>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;
                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    list.forEach(s => {
                        const isOk = s.ping !== 'n/a';
                        html += `
                        <div class="row">
                            <span class="name">${s.name}</span>
                            <span class="val ${isOk ? 'ok' : 'bad'}">${s.ping}${isOk ? 'ms' : ''}</span>
                        </div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };

                render(data.discord, 'discord_list');
                render(data.gta, 'gta_list');
                render(data.valve, 'valve_list');
            } catch (e) {}
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
