<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --card-bg: rgba(18, 18, 22, 0.7);
            --accent: #00f2ff;
            --green: #00ff88;
            --red: #ff3e3e;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050507 60%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 460px;
        }

        header {
            margin-bottom: 40px;
            text-align: left;
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to right, #fff, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #444;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--green);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px); /* Стеклянный эффект */
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            font-size: 11px;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 15px 0;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .row:last-child { border-bottom: none; }

        .name { font-size: 14px; color: #aaa; font-weight: 500; }
        .val { font-size: 14px; 
               /* ТУТ ИСПРАВИЛ: ПИНГ ТЕПЕРЬ ОБЫЧНЫЙ */
               font-weight: 400; 
               font-variant-numeric: tabular-nums; }
        
        .val.ok { color: var(--green); font-weight: 600;} /* Статус можно выделить, сам пинг обычный */
        .val.bad { color: var(--red); opacity: 0.5; }

        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 10px;
            color: #222;
        }

        .author { color: #444; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
            <div class="status-bar"><div class="dot"></div> ОБНОВЛЕНО <span id="time">...</span></div>
        </header>

        <div class="card">
            <h2>ROCKSTAR NETWORK</h2>
            <div id="gta_list"></div>
        </div>

        <div class="card">
            <h2>DISCORD VOICE</h2>
            <div id="discord_list"></div>
        </div>

        <div class="card">
            <h2>TOP 5 VALVE RELAYS</h2>
            <div id="valve_list"></div>
        </div>

        <div class="footer">
            DATABASE: FIREBASE | HOST: GITHUB<br><br>
            by <span class="author">@maybedontab</span>
        </div>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;
                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    list.forEach(s => {
                        const isOk = s.ping !== 'n/a';
                        html += `
                        <div class="row">
                            <span class="name">${s.name}</span>
                            <span class="val ${isOk ? 'ok' : 'bad'}">${s.ping}${isOk ? 'ms' : ''}</span>
                        </div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };

                render(data.discord, 'discord_list');
                render(data.gta, 'gta_list');
                render(data.valve, 'valve_list');
            } catch (e) {}
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
