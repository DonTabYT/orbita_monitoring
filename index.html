<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #bc13fe;
            --green: #00ff88;
            --red: #ff003c;
            --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at center, #1a0b2e 0%, #050508 80%);
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .dashboard { width: 100%; max-width: 480px; }

        header { margin-bottom: 50px; text-align: center; }

        h1 {
            font-family: 'Unbounded', cursive;
            font-size: 28px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #bc13fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(188, 19, 254, 0.3));
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 10px;
            font-weight: 800;
            color: rgba(188, 19, 254, 0.5);
            margin-top: 15px;
            text-transform: uppercase;
        }

        #time { color: #fff; }

        .dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* БЛОК ПРИ ВЫКЛЮЧЕННОМ ПК */
        #offline_msg {
            display: none;
            text-align: center;
            padding: 40px;
            background: rgba(255, 0, 60, 0.05);
            border: 1px solid var(--red);
            border-radius: 32px;
            margin-bottom: 25px;
            font-weight: 600;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(160%);
            -webkit-backdrop-filter: blur(25px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-size: 11px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
        }

        .row:last-child { border-bottom: none; }
        .name { color: rgba(255, 255, 255, 0.5); }
        .val { font-variant-numeric: tabular-nums; font-weight: 600; }
        .val.ok { color: var(--green); text-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        .val.bad { color: var(--red); text-shadow: 0 0 10px rgba(255, 0, 60, 0.3); }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        .author { color: var(--accent); text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
            <div class="status-bar">
                <div class="dot" id="status_dot"></div>
                ОБНОВЛЕНО <span id="time">...</span>
            </div>
        </header>

        <main id="main_content">
            <div id="offline_msg">Хост сайта временно отдыхает<br>(пк выключен)</div>

            <div id="data_cards">
                <div class="card">
                    <h2>ТОП 5 СЕРВЕРОВ VALVE ПО ПИНГУ</h2>
                    <div id="valve_list"></div>
                </div>

                <div class="card">
                    <h2>СЕРВЕРА ROCKSTAR</h2>
                    <div id="gta_list"></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            БАЗА ДАННЫХ: FIREBASE | ХОСТИНГ: GITHUB<br>
            <a href="https://t.me/maybedontab" target="_blank" class="author">by @maybedontab</a>
        </footer>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";

        async function updateData() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                if (!data) return;

                const now = Date.now() / 1000;
                const lastTimestamp = data.timestamp || 0;
                const isOffline = (now - lastTimestamp) > 60; // Если больше минуты нет вестей

                if (isOffline) {
                    document.getElementById('offline_msg').style.display = 'block';
                    document.getElementById('data_cards').style.opacity = '0.3';
                    document.getElementById('status_dot').style.background = '#ff003c';
                    document.getElementById('status_dot').style.boxShadow = '0 0 15px #ff003c';
                } else {
                    document.getElementById('offline_msg').style.display = 'none';
                    document.getElementById('data_cards').style.opacity = '1';
                    document.getElementById('status_dot').style.background = '#bc13fe';
                    document.getElementById('status_dot').style.boxShadow = '0 0 15px #bc13fe';
                }

                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    if (!list) return;
                    list.forEach(s => {
                        const isOk = s.ping !== 'n/a';
                        const pingValue = isOk ? s.ping + 'мс' : 'СДОХ';
                        html += `
                        <div class="row">
                            <span class="name">${s.name}</span>
                            <span class="val ${isOk ? 'ok' : 'bad'}">${pingValue}</span>
                        </div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };

                render(data.valve, 'valve_list');
                render(data.gta, 'gta_list');
            } catch (e) {
                console.error("Ошибка загрузки:", e);
            }
        }

        setInterval(updateData, 10000);
        updateData();
    </script>
</body>
</html>
