<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080a;
            --card-bg: #111114;
            --accent: #00e5ff;
            --green: #00ff88;
            --red: #ff3e3e;
            --text: #e0e0e0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace; /* Читается идеально */
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .dashboard {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 16px;
            border: 1px solid #1f1f24;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 22px;
            margin: 0 0 10px 0;
            color: #fff;
            letter-spacing: -1px;
        }

        .status-header {
            font-size: 11px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 30px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
        }

        section { margin-top: 30px; }

        h2 {
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1f;
            font-size: 14px;
        }

        .val { font-weight: 700; }
        .val.ok { color: var(--green); }
        .val.bad { color: var(--red); opacity: 0.5; }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
        <div class="status-header"><div class="dot"></div> ОБНОВЛЕНО <span id="time">...</span></div>
        
        <section>
            <h2>DISCORD VOICE HUBS</h2>
            <div id="discord_list"></div>
        </section>

        <section>
            <h2>ROCKSTAR NETWORK</h2>
            <div id="gta_list"></div>
        </section>

        <section>
            <h2>TOP 5 VALVE RELAYS</h2>
            <div id="valve_list"></div>
        </section>

        <div class="footer">
            DATABASE: FIREBASE | HOST: GITHUB<br>
            <span style="color: #555">by @maybedontab</span>
        </div>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    list.forEach(s => {
                        const isOk = s.ping !== 'n/a';
                        html += `
                        <div class="row">
                            <span>${s.name}</span>
                            <span class="val ${isOk ? 'ok' : 'bad'}">${s.ping}${isOk ? 'ms' : ''}</span>
                        </div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };

                render(data.discord, 'discord_list');
                render(data.gta, 'gta_list');
                render(data.valve, 'valve_list');
            } catch (e) {}
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
