<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #bc13fe; --rs: #00f2ff; --green: #00ff88; --red: #ff003c; --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { background: var(--bg); background-image: radial-gradient(circle at center, #1a0b2e 0%, #050508 80%); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 20px; }
        .dashboard { width: 100%; max-width: 500px; }
        header { margin-bottom: 40px; text-align: center; }
        h1 { font-family: 'Unbounded', cursive; font-size: 28px; background: linear-gradient(180deg, #fff 0%, #bc13fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(188, 19, 254, 0.8)); text-shadow: 0 0 5px rgba(255, 255, 255, 0.2); }
        .status-bar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; font-size: 10px; color: rgba(188, 19, 254, 0.5); font-weight: 800; text-transform: uppercase; }
        #time { color: #fff; font-weight: 900; font-size: 11px; letter-spacing: 1px; }
        .refresh-rate { color: #fff; font-size: 9px; font-weight: 900; text-shadow: 0 0 8px rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); padding: 3px 7px; border-radius: 5px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .card { background: var(--glass); backdrop-filter: blur(25px) saturate(160%); border: 1px solid var(--glass-border); border-radius: 32px; padding: 25px; margin-bottom: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h2 { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; }
        .row:last-child { border-bottom: none; }
        .check-box { margin-right: 15px; appearance: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2); border-radius: 4px; cursor: pointer; transition: 0.3s; position: relative; }
        .check-box:checked { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .check-box:checked::after { content: '✔'; position: absolute; font-size: 10px; color: #fff; left: 1px; top: -1px; }
        .name { color: rgba(255, 255, 255, 0.5); flex-grow: 1; }
        .val { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 50px; text-align: right; }
        .val.ok { color: var(--green); text-shadow: 0 0 10px rgba(0, 255, 136, 0.6); }
        .val.bad { color: var(--red); text-shadow: 0 0 10px rgba(255, 0, 60, 0.6); }
        .chart-wrapper { height: 260px; position: relative; margin-top: 10px; }
        .time-labels { display: flex; justify-content: space-between; margin-top: 12px; font-size: 9px; color: #444; font-weight: 800; text-transform: uppercase; }
        
        /* СТИЛЬ ФУТЕРА */
        .footer { text-align: center; margin-top: 40px; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }
        .author { color: var(--accent); text-decoration: none; font-weight: 900; text-shadow: 0 0 10px var(--accent); transition: 0.3s; }
        .author:hover { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
            <div class="status-bar"><div class="dot" id="status_dot"></div><span>ОБНОВЛЕНО</span> <span id="time">...</span><span class="refresh-rate">(5 СЕК)</span></div>
        </header>
        <main>
            <div class="card"><h2>TOP 5 VALVE SERVERS</h2><div id="valve_list">Загрузка...</div></div>
            <div class="card"><h2>СЕРВЕРА ROCKSTAR</h2><div id="gta_list">Загрузка...</div></div>
            <div class="card"><h2>МОНИТОРИНГ СТАБИЛЬНОСТИ (1 ЧАС)</h2>
                <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
                <div class="time-labels"><span id="start_t">...</span><span id="end_t">...</span></div>
            </div>
        </main>
        <footer class="footer">
            by <a href="https://t.me/maybedontab" target="_blank" class="author">@maybedontab</a>
        </footer>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";
        const ctx = document.getElementById('mainChart').getContext('2d');
        const getSaved = (n) => localStorage.getItem('mon_' + n) !== 'false';
        
        let global_dead_names = [];

        const mainChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Valve', data: [], borderColor: '#bc13fe', borderWidth: 2, fill: true, backgroundColor: 'rgba(188, 19, 254, 0.1)', tension: 0.4, hitRadius: 25, pointRadius: (c) => c.dataIndex === c.dataset.data.length - 1 ? 0 : 2.5, pointBackgroundColor: '#bc13fe', pointBorderColor: '#bc13fe' },
                { label: 'Rockstar', data: [], borderColor: '#00f2ff', borderWidth: 2, fill: true, backgroundColor: 'rgba(0, 242, 255, 0.1)', tension: 0.4, hitRadius: 25, pointRadius: (c) => c.dataIndex === c.dataset.data.length - 1 ? 0 : 2.5, pointBackgroundColor: '#00f2ff', pointBorderColor: '#00f2ff' },
                { 
                    label: 'СДОХ', data: [], borderColor: '#ff003c', borderWidth: 2, 
                    showLine: true, spanGaps: false, hitRadius: 40, 
                    /* ИСПРАВИЛ: ТОЧКА УДАЛЯЕТСЯ ЕСЛИ НЕТ ОТВАЛА */
                    pointRadius: (c) => {
                        const val = c.dataset.data[c.dataIndex];
                        return (val !== null && global_dead_names[c.dataIndex]?.length > 0) ? 2.5 : 0;
                    }, 
                    pointBackgroundColor: '#ff003c', pointBorderColor: '#ff003c' 
                }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'nearest', axis: 'xy', intersect: true },
                plugins: {
                    legend: { display: true, labels: { color: '#555', usePointStyle: true, pointStyle: 'line' } },
                    tooltip: {
                        enabled: true, usePointStyle: true,
                        callbacks: {
                            title: (c) => 'ВРЕМЯ: ' + c[0].label,
                            label: (c) => c.datasetIndex === 2 ? 'СТАТУС: ОТВАЛ' : ` ${c.dataset.label}: ${c.raw === 0 ? 'СДОХ' : Math.round(c.raw) + 'мс'}`,
                            afterBody: (c) => { 
                                if (c[0].datasetIndex === 2) { 
                                    const dead = global_dead_names[c[0].dataIndex]; 
                                    if (dead && dead.length > 0) return ['', 'В ОТВАЛЕ:', ...dead.map(n => ' • ' + n)]; 
                                } 
                                return null; 
                            }
                        },
                        filter: (item) => {
                            const active = item.chart.getActiveElements();
                            if (active.length > 0) {
                                const idx = active[0].datasetIndex;
                                return idx === 2 ? item.datasetIndex === 2 : item.datasetIndex !== 2;
                            }
                            return true;
                        }
                    }
                },
                scales: { x: { display: false }, y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: 'rgba(255,255,255,0.1)', font: { size: 9 } } } }
            }
        });

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data || !data.t_h) return;

                document.getElementById('status_dot').style.background = (Date.now() / 1000 - (data.timestamp || 0)) > 30 ? '#ff003c' : '#bc13fe';
                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    if (!list) return;
                    let html = '';
                    list.forEach(s => {
                        const check = getSaved(s.name);
                        const isDead = s.ping === 'СДОХ' || s.ping === 0;
                        html += `<div class="row"><input type="checkbox" class="check-box" ${check ? 'checked' : ''} onchange="localStorage.setItem('mon_${s.name}', this.checked); update();"><span class="name">${s.name}</span><span class="val ${isDead ? 'bad' : 'ok'}">${isDead ? 'СДОХ' : s.ping + 'мс'}</span></div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };
                render(data.valve, 'valve_list'); render(data.gta, 'gta_list');

                let labels = [...data.t_h];
                let v_data = [...data.v_h];
                let rs_data = [...data.rs_h];
                let dead_data = [...data.dead_points];
                global_dead_names = [...data.dead_names_h];

                if (labels.length > 0 && labels[labels.length - 1] !== data.last_update) {
                    labels.push(data.last_update);
                    v_data.push(data.live_v || 0);
                    rs_data.push(data.live_rs || 0);
                    
                    const currentDead = [].concat(data.valve || [], data.gta || []).filter(s => s.ping === 'СДОХ').map(s => s.name);
                    // ИСПРАВИЛ: Если нет отвала - пушим null, линия и точка пропадут
                    dead_data.push(currentDead.length > 0 ? 0 : null); 
                    global_dead_names.push(currentDead);
                }

                mainChart.data.labels = labels;
                mainChart.data.datasets[0].data = v_data;
                mainChart.data.datasets[1].data = rs_data;
                mainChart.data.datasets[2].data = dead_data;
                mainChart.update('none');

                document.getElementById('start_t').innerText = labels[0] || '...';
                document.getElementById('end_t').innerText = labels[labels.length - 1] || '...';

            } catch (e) { console.error("Ошибка обновления:", e); }
        }

        update(); setInterval(update, 5000);
    </script>
</body>
</html>
