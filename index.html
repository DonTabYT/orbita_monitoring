<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Орбита Мониторинг</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0f0f12;
            --accent: #00e5ff;
            --green: #00ff88;
            --red: #ff3e3e;
            --text-dim: #888;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid #1f1f24;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .dashboard::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 60%);
            pointer-events: none;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 8px 0;
            letter-spacing: -1px;
            color: #fff;
        }

        .status-header {
            display: flex;
            align-items: center;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 12px var(--green);
            animation: pulse 2.5s infinite;
        }

        #time {
            margin-left: 6px;
            color: #fff;
            opacity: 0.8;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        section { margin-top: 35px; }

        h2 {
            font-size: 10px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #1a1a1f;
        }

        .row:last-child { border-bottom: none; }

        .name { font-size: 14px; font-weight: 400; color: #eee; }
        .val { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
        
        .val.ok { color: var(--green); }
        .val.bad { color: var(--red); opacity: 0.6; }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 10px;
            color: #3a3a3f;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .author {
            color: var(--accent);
            text-decoration: none;
            opacity: 0.7;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
        <div class="status-header"><div class="dot"></div> ОБНОВЛЕНО <span id="time">загрузка...</span></div>
        
        <section id="discord_sec">
            <h2>Сервисы Discord</h2>
            <div id="discord_list"></div>
        </section>

        <section id="gta_sec">
            <h2>Сеть Rockstar (GTA 5)</h2>
            <div id="gta_list"></div>
        </section>

        <section id="valve_sec">
            <h2>Топ-5 серверов Valve</h2>
            <div id="valve_list"></div>
        </section>

        <div class="footer">
            БАЗА ДАННЫХ FIREBASE & GITHUB PAGES <br>
            <span style="margin-top: 10px; display: block;">by <span class="author">@maybedontab</span></span>
        </div>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    if (!list || list.length === 0) {
                        html = '<div class="row"><span class="name" style="color:#444">Ожидание данных...</span></div>';
                    } else {
                        list.forEach(s => {
                            const isOk = s.ping !== 'n/a';
                            html += `
                            <div class="row">
                                <span class="name">${s.name}</span>
                                <span class="val ${isOk ? 'ok' : 'bad'}">${s.ping}${isOk ? 'мс' : ''}</span>
                            </div>`;
                        });
                    }
                    document.getElementById(targetId).innerHTML = html;
                };

                render(data.discord, 'discord_list');
                render(data.gta, 'gta_list');
                render(data.valve, 'valve_list');

            } catch (e) { 
                document.getElementById('time').innerText = "ОШИБКА СЕТИ";
            }
        }

        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
