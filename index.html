<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #bc13fe; --rs: #00f2ff; --green: #00ff88; --red: #ff003c; --bg: #050508;
            --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { background: var(--bg); background-image: radial-gradient(circle at center, #1a0b2e 0%, #050508 80%); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 20px; }
        .dashboard { width: 100%; max-width: 500px; }
        header { margin-bottom: 40px; text-align: center; }
        h1 { font-family: 'Unbounded', cursive; font-size: 28px; background: linear-gradient(180deg, #fff 0%, #bc13fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(188, 19, 254, 0.8)); text-shadow: 0 0 5px rgba(255, 255, 255, 0.2); }
        
        .status-bar { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 10px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); animation: pulse 2s infinite; flex-shrink: 0; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .status-info { display: flex; flex-direction: column; gap: 4px; text-align: left; min-width: 200px; }
        .status-line { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.2; }
        .status-title { color: var(--accent); }
        .status-val { color: #fff; margin-left: 5px; } 

        .refresh-badge { font-family: 'Inter', sans-serif; color: #fff; font-size: 9px; font-weight: 900; background: rgba(255,255,255,0.1); padding: 3px 6px; border-radius: 5px; margin-left: 10px; white-space: nowrap; }

        .card { background: var(--glass); backdrop-filter: blur(25px) saturate(160%); border: 1px solid var(--glass-border); border-radius: 32px; padding: 25px; margin-bottom: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        h2 { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); font-size: 14px; }
        .row:last-child { border-bottom: none; }
        .val { font-variant-numeric: tabular-nums; font-weight: 600; min-width: 50px; text-align: right; }
        .val.ok { color: var(--green); text-shadow: 0 0 10px rgba(0, 255, 136, 0.6); }
        .val.bad { color: var(--red); text-shadow: 0 0 10px rgba(255, 0, 60, 0.6); }

        .chart-wrapper { height: 260px; position: relative; margin-top: 10px; }
        .time-labels { display: flex; justify-content: space-between; margin-top: 12px; font-size: 9px; color: #444; font-weight: 800; text-transform: uppercase; }
        
        .footer { text-align: center; margin-top: 40px; font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 1px; line-height: 1.6; }
        .author { color: var(--accent); text-decoration: none; font-weight: 900; text-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
            <div class="status-bar">
                <div class="dot" id="status_dot"></div>
                <div class="status-info" id="status_box">
                    <div class="status-line"><span class="status-title">ОБНОВЛЕНО</span> <span id="time" class="status-val">...</span> <span class="refresh-badge">(🔄 5 СЕК)</span></div>
                    <div class="status-line"><span class="status-title">СЕЙЧАС</span> <span id="current_clock" class="status-val">...</span></div>
                </div>
            </div>
        </header>
        <main id="main_ui">
            <div class="card"><h2>ТОП 5 VALVE СЕРВЕРОВ ПО ПИНГУ</h2><div id="valve_list"></div></div>
            <div class="card"><h2>СЕРВЕРА ROCKSTAR (TCP)</h2><div id="gta_list"></div></div>
            <div class="card"><h2>ГРАФИК СТАБИЛЬНОСТИ (1 ЧАС)</h2>
                <div class="chart-wrapper"><canvas id="mainChart"></canvas></div>
                <div class="time-labels"><span id="start_t">...</span><span id="end_t">...</span></div>
            </div>
        </main>
        <footer class="footer">
            by <a href="https://t.me/maybedontab" target="_blank" class="author">@maybedontab</a><br>
            Есть идеи, пишите. Девочкам можно писать без идей)
        </footer>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";
        const ctx = document.getElementById('mainChart').getContext('2d');
        const getSaved = (n) => localStorage.getItem('mon_' + n) !== 'false';
        let global_dead_names = [];
        let lastDataTimestamp = 0, stallCounter = 0;

        // ЧАСЫ
        setInterval(() => {
            const el = document.getElementById('current_clock');
            if (el) el.innerText = new Date().toTimeString().split(' ')[0];
        }, 1000);

        const mainChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [
                { label: 'Valve', data: [], borderColor: '#bc13fe', borderWidth: 2, fill: true, backgroundColor: 'rgba(188, 19, 254, 0.1)', tension: 0.4, hitRadius: 25, pointRadius: (c) => c.dataIndex === c.dataset.data.length - 1 ? 0 : 2.5, pointBackgroundColor: '#bc13fe', pointBorderColor: '#bc13fe' },
                { label: 'Rockstar', data: [], borderColor: '#00f2ff', borderWidth: 2, fill: true, backgroundColor: 'rgba(0, 242, 255, 0.1)', tension: 0.4, hitRadius: 25, pointRadius: (c) => c.dataIndex === c.dataset.data.length - 1 ? 0 : 2.5, pointBackgroundColor: '#00f2ff', pointBorderColor: '#00f2ff' },
                { label: 'СДОХ', data: [], borderColor: '#ff003c', borderWidth: 2, showLine: false, 
                  pointRadius: (c) => (c.dataset.data[c.dataIndex] !== null && global_dead_names[c.dataIndex]?.length > 0) ? 2.5 : 0, 
                  pointHitRadius: (c) => (c.dataset.data[c.dataIndex] !== null && global_dead_names[c.dataIndex]?.length > 0) ? 40 : 0,
                  pointBackgroundColor: '#ff003c', pointBorderColor: '#ff003c' }
            ]},
            options: {
                responsive: true, maintainAspectRatio: false, interaction: { mode: 'nearest', axis: 'xy', intersect: true },
                plugins: {
                    legend: { display: true, labels: { color: '#555', usePointStyle: true, pointStyle: 'line', filter: (item) => ['Valve', 'Rockstar', 'СДОХ'].includes(item.text) }},
                    tooltip: { enabled: true, usePointStyle: true, callbacks: {
                        title: (c) => 'ВРЕМЯ: ' + (c[0]?.label || '...'),
                        label: (c) => { if (c.datasetIndex === 2) return 'СТАТУС: ОБНАРУЖЕН ОТВАЛ'; return `${c.dataset.label}: ${c.raw === 0 ? 'СДОХ' : Math.round(c.raw) + 'мс'}`; },
                        afterBody: (c) => { const dead = global_dead_names[c[0].dataIndex]; return (dead && dead.length > 0) ? ['', 'В ОТВАЛЕ:', ...dead.map(n => ' • ' + n)] : null; }
                    }, filter: (item) => { const active = item.chart.getActiveElements(); if (active.length > 0) { return active[0].datasetIndex === 2 ? item.datasetIndex === 2 : item.datasetIndex !== 2; } return true; }}
                },
                scales: { x: { display: false }, y: { beginAtZero: true, min: 0, suggestedMax: 150, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: 'rgba(255,255,255,0.1)', font: { size: 9 } } } }
            }
        });

        async function update() {
            try {
                const res = await fetch(DB_URL + "?v=" + Math.random(), { cache: "no-store", headers: { 'Cache-Control': 'no-cache', 'Pragma': 'no-cache' } });
                const data = await res.json();
                if (!data) return;

                if (data.timestamp === lastDataTimestamp) { stallCounter++; } else { lastDataTimestamp = data.timestamp; stallCounter = 0; }

                const sDot = document.getElementById('status_dot');
                const sBox = document.getElementById('status_box');
                const ui = document.getElementById('main_ui');
                const nowClock = new Date().toTimeString().split(' ')[0];

                if (data.status === 'offline' || stallCounter >= 4) {
                    sDot.style.background = '#ff003c'; ui.style.opacity = '0.3';
                    const msg = data.status === 'offline' ? 'ХОСТ СЕЙЧАС ОТДЫХАЕТ (ПК ВЫКЛЮЧЕН)' : 'ОРБИТА СЕЙЧАС ПОСАСЫВАЕТ ЧЛЕН';
                    sBox.innerHTML = `<div class="status-line"><span style="color:#ff003c">${msg}</span></div><div class="status-line" style="color:#ff003c; font-size: 8px; font-weight: 900; margin-top: 2px;">(ПИНГИ НИЖЕ НЕ АКТУАЛЬНЫ)</div>`;
                } else {
                    sDot.style.background = '#bc13fe'; ui.style.opacity = '1';
                    sBox.innerHTML = `
                        <div class="status-line"><span class="status-title">ОБНОВЛЕНО</span><span class="status-val">${data.last_update}</span><span class="refresh-badge">(🔄 5 СЕК)</span></div>
                        <div class="status-line"><span class="status-title">СЕЙЧАС</span><span id="current_clock" class="status-val">${nowClock}</span></div>
                    `;
                }

                const render = (list, id) => {
                    let html = '';
                    if (list) list.forEach(s => { html += `<div class="row"><span style="color:rgba(255,255,255,0.5);flex-grow:1">${s.name}</span><span class="val ${s.ping === 'СДОХ' ? 'bad' : 'ok'}">${s.ping === 'СДОХ' ? 'СДОХ' : s.ping + 'мс'}</span></div>`; });
                    document.getElementById(id).innerHTML = html;
                };
                render(data.valve, 'valve_list'); render(data.gta, 'gta_list');

                let h_labels = data.t_h || [];
let len = h_labels.length || 120;
let h_v = data.v_h || [];
let h_rs = data.rs_h || [];

// Функция-спасатель от фокусов Firebase
const parseFB = (obj) => {
    if (!obj) return Array(len).fill(null);
    if (Array.isArray(obj)) return obj; // Если пришел нормальный массив - отдаем
    
    // Если Firebase прислал объект, собираем массив обратно по индексам
    let arr = Array(len).fill(null);
    Object.keys(obj).forEach(k => arr[k] = obj[k]);
    return arr;
};

let h_dead = parseFB(data.dead_points);
let h_dead_names = parseFB(data.dead_names_h);

                if (h_labels.length > 0) {
                    let f_labels = [...h_labels];
                    let f_v = [...h_v];
                    let f_rs = [...h_rs];
                    let f_dead = [...h_dead];
                    let f_dead_names = [...h_dead_names];
                    if (f_labels[f_labels.length - 1] !== data.last_update) {
                        f_labels.push(data.last_update);
                        f_v.push(data.live_v || 0);
                        f_rs.push(data.live_rs || 0);
                        const curDead = [].concat(data.valve || [], data.gta || []).filter(s => s.ping === 'СДОХ').map(s => s.name);
                        f_dead.push(curDead.length > 0 ? 0 : null);
                        f_dead_names.push(curDead);
                    }

                    global_dead_names = f_dead_names;
                    mainChart.data.labels = f_labels;
                    mainChart.data.datasets[0].data = f_v;
                    mainChart.data.datasets[1].data = f_rs;
                    mainChart.data.datasets[2].data = f_dead;
                    mainChart.update('none');

                    document.getElementById('start_t').innerText = f_labels[0];
                    document.getElementById('end_t').innerText = f_labels[f_labels.length - 1];
                }
            } catch (e) { console.error(e); }
        }
        update(); setInterval(update, 5000);
    </script>
</body>
</html>
