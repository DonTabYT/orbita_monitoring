<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОРБИТА ХУЙНЯ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --green: #00ff88;
            --red: #ff3e3e;
        }

        body {
            background: #050508;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Декоративные пятна для эффекта стекла */
        body::before {
            content: '';
            position: fixed;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 70%);
            z-index: -1;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -10%; right: -10%;
            width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.03) 0%, transparent 70%);
            z-index: -1;
        }

        .dashboard { width: 100%; max-width: 480px; }

        header { margin-bottom: 40px; }

        h1 {
            font-size: 34px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1.5px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 800;
            color: rgba(255,255,255,0.2);
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dot { 
            width: 8px; height: 8px; 
            background: var(--green); 
            border-radius: 50%; 
            box-shadow: 0 0 15px var(--green); 
        }

        /* ЭФФЕКТ СТЕКЛА */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 11px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 16px;
        }

        .row:last-child { border-bottom: none; }

        .name { color: rgba(255,255,255,0.6); font-weight: 500; }
        
        /* ПИНГ ТЕПЕРЬ НЕ ЖИРНЫЙ */
        .val { 
            font-variant-numeric: tabular-nums; 
            font-weight: 400; 
        }
        
        .val.ok { color: var(--green); }
        .val.bad { color: var(--red); opacity: 0.4; }

        .footer {
            text-align: center;
            margin-top: 60px;
            font-size: 11px;
            color: rgba(255,255,255,0.1);
            font-weight: 600;
        }

        .author { 
            color: var(--accent); 
            text-decoration: none; 
            transition: 0.3s;
            display: inline-block;
            margin-top: 5px;
        }
        .author:hover { opacity: 0.8; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>🛰️ ОРБИТА ХУЙНЯ</h1>
            <div class="status-bar"><div class="dot"></div> ОБНОВЛЕНО <span id="time">...</span></div>
        </header>

        <div class="card">
            <h2>TOP 5 VALVE RELAYS</h2>
            <div id="valve_list"></div>
        </div>

        <div class="card">
            <h2>ROCKSTAR NETWORK</h2>
            <div id="gta_list"></div>
        </div>

        <div class="footer">
            DATABASE: FIREBASE | HOST: GITHUB<br>
            by <a href="https://t.me/maybedontab" target="_blank" class="author">@maybedontab</a>
        </div>
    </div>

    <script>
        const DB_URL = "https://orbita-monitor-default-rtdb.firebaseio.com/data.json";

        async function update() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;
                document.getElementById('time').innerText = data.last_update;

                const render = (list, targetId) => {
                    let html = '';
                    if (!list) return;
                    list.forEach(s => {
                        const isOk = s.ping !== 'n/a';
                        html += `
                        <div class="row">
                            <span class="name">${s.name}</span>
                            <span class="val ${isOk ? 'ok' : 'bad'}">${s.ping}${isOk ? 'ms' : ''}</span>
                        </div>`;
                    });
                    document.getElementById(targetId).innerHTML = html;
                };

                // Рендерим только нужное
                render(data.valve, 'valve_list');
                render(data.gta, 'gta_list');
            } catch (e) {}
        }
        setInterval(update, 10000);
        update();
    </script>
</body>
</html>
